name: 1. Manual Patch
permissions: write-all
env:
  repository: ${{ github.repository }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  org_input: ${{ inputs.org }}
  org_event_input: ${{ github.event.inputs.org }}
on:
  workflow_dispatch:
    inputs:
      org:
        description: 'Which "Morphe" patches do you want to patch?'
        required: true
        default: 'Morphe'
        type: choice
        options:
          - 'Morphe'
          - 'Twitter Piko Beta'
          - 'hoo-dles'
  workflow_call:
    inputs:
      org:
        required: true
        type: string
jobs:
  patch_morphe:
    name: Patch Morphe
    if: ${{ github.event.inputs.org == 'Morphe' || inputs.org == 'Morphe' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Preparing to patch
        uses: ./.github/actions/preparing
      - name: Check github connection
        id: check-gh-morphe
        run: bash src/etc/connection.sh
      - name: Patch apk
        id: patch-morphe
        if: steps.check-gh-morphe.outputs.internet_error == '0'
        run: bash src/build/build.sh "morphe-patches" "MorpheApp" "com.google.android.youtube" "youtube" "google-inc/youtube/youtube" 
      - name: Releasing APK files
        id: releasemorphe
        if: steps.check-gh-morphe.outputs.internet_error == '0'
        uses: ./.github/actions/release
        with:
         release_name: "YouTube Morphe"
        
      
